<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huellas - COMPARACIÓN REAL ✅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#165DFF', success: '#10B981', danger: '#EF4444' } }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="bg-primary text-white p-5 shadow-md">
        <div class="container mx-auto max-w-4xl flex items-center gap-3">
            <i class="fa fa-fingerprint text-3xl"></i>
            <h1 class="text-xl font-bold">Sistema Huellas - COMPARACIÓN REAL ✅</h1>
        </div>
    </header>

    <main class="container mx-auto max-w-4xl p-4">

        <!-- 📝 REGISTRAR -->
        <section class="bg-white rounded-xl shadow p-6 mb-8">
            <h2 class="text-2xl font-bold text-center text-primary mb-6">📝 Registrar Nuevo</h2>

            <form id="formRegistro" class="grid md:grid-cols-2 gap-6">
                <div class="space-y-3">
                    <h3 class="font-semibold text-lg text-gray-700">Datos Personales</h3>
                    <div>
                        <label class="text-sm">Cédula *</label>
                        <input type="text" id="cedula" class="w-full border p-2 rounded-lg" required placeholder="Ej: 1234567">
                    </div>
                    <div>
                        <label class="text-sm">Nombres *</label>
                        <input type="text" id="nombres" class="w-full border p-2 rounded-lg" required>
                    </div>
                    <div>
                        <label class="text-sm">Apellidos *</label>
                        <input type="text" id="apellidos" class="w-full border p-2 rounded-lg" required>
                    </div>
                    <div>
                        <label class="text-sm">Teléfono</label>
                        <input type="tel" id="telefono" class="w-full border p-2 rounded-lg">
                    </div>
                </div>

                <div class="space-y-3">
                    <h3 class="font-semibold text-lg text-gray-700">Huella Dactilar *</h3>
                    
                    <label class="block bg-success text-white text-center py-2 rounded-lg cursor-pointer hover:bg-green-700">
                        <i class="fa fa-camera mr-2"></i> Tomar Foto Clara
                        <input type="file" id="camaraRegistro" accept="image/*" capture="environment" class="hidden">
                    </label>

                    <label class="block border border-gray-300 text-center py-2 rounded-lg cursor-pointer hover:border-primary">
                        <i class="fa fa-upload mr-2"></i> Subir Imagen
                        <input type="file" id="subirRegistro" accept="image/*" class="hidden">
                    </label>

                    <div id="vistaRegistro" class="mt-3 hidden p-2 bg-gray-50 rounded border">
                        <p class="text-xs text-gray-600 mb-1">Vista previa:</p>
                        <img id="imgRegistroVista" class="max-h-32 mx-auto rounded border shadow" alt="Huella">
                        <p id="estadoHuella" class="text-xs text-green-600 font-bold mt-1">✅ Lista para procesar</p>
                    </div>
                </div>

                <div class="md:col-span-2 text-center">
                    <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold text-lg hover:bg-blue-700">
                        💾 GUARDAR REGISTRO
                    </button>
                </div>
            </form>
        </section>


        <!-- 🔍 BUSCAR - COMPARACIÓN REAL -->
        <section class="bg-white rounded-xl shadow p-6">
            <h2 class="text-2xl font-bold text-center text-primary mb-6">🔍 Buscar Huella</h2>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="border-2 border-success rounded-xl p-5 bg-green-50 text-center">
                    <h3 class="font-semibold text-success mb-3">📸 Escanear Huella</h3>
                    <p class="text-xs text-gray-600 mb-3">Toma foto clara (puede ser distinta a la de registro)</p>
                    
                    <label class="block bg-success text-white py-3 rounded-lg font-bold cursor-pointer hover:bg-green-700">
                        <i class="fa fa-camera mr-2"></i> ABRIR CÁMARA
                        <input type="file" id="camaraBuscar" accept="image/*" capture="environment" class="hidden">
                    </label>
                    <div id="vistaCamaraBuscar" class="mt-4 hidden">
                        <img class="max-h-28 mx-auto rounded border shadow" alt="Huella">
                        <button id="btnComparar1" class="w-full mt-2 bg-primary text-white py-2 rounded-lg">🔎 COMPARAR PATRONES</button>
                    </div>
                </div>

                <div class="border-2 border-dashed border-gray-300 rounded-xl p-5 text-center">
                    <h3 class="font-semibold text-gray-700 mb-3📁">📁 Subir Imagen</h3>
                    <label class="block border-2 border-dashed border-gray-400 py-3 rounded-lg cursor-pointer hover:border-primary">
                        <i class="fa fa-upload text-2xl text-gray-500 mb-1"></i>
                        <p class="text-sm">SELECCIONAR IMAGEN</p>
                        <input type="file" id="subirBuscar" accept="image/*" class="hidden">
                    </label>
                    <div id="vistaSubirBuscar" class="mt-4 hidden">
                        <img class="max-h-28 mx-auto rounded border shadow" alt="Huella">
                        <button id="btnComparar2" class="w-full mt-2 bg-primary text-white py-2 rounded-lg">🔎 COMPARAR PATRONES</button>
                    </div>
                </div>
            </div>

            <!-- Resultado con porcentaje de coincidencia -->
            <div id="resultadoBusqueda" class="mt-6 p-4 rounded-lg hidden"></div>
        </section>

    </main>

    <script>
        let baseDatos = [];
        try {
            const guardado = localStorage.getItem('huellasRealDB');
            if(guardado) baseDatos = JSON.parse(guardado);
        } catch(e) { baseDatos = []; }
        let huellaPatron = null; // Aquí guardamos el patrón numérico de la huella


        // ==============================================
        // 🧠 FUNCIÓN CLAVE: EXTRAE PATRÓN DE LA HUELLA
        // ==============================================
        function extraerPatron(imagenDataURL, callback) {
            const img = new Image();
            img.onload = () => {
                // 1. Reducimos tamaño y convertimos a escala de grises
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const TAM = 32; // Tamaño fijo para análisis
                canvas.width = TAM;
                canvas.height = TAM;

                // Escalamos y dibujamos en blanco/negro
                ctx.drawImage(img, 0, 0, TAM, TAM);
                const datos = ctx.getImageData(0, 0, TAM, TAM).data;

                // 2. Convertimos la imagen a una lista de números (patrón)
                let patron = [];
                let sumaLuz = 0;

                // Primero calculamos el brillo promedio para saber qué es línea y qué es fondo
                for(let i=0; i<datos.length; i+=4) {
                    const gris = (datos[i] + datos[i+1] + datos[i+2]) / 3;
                    sumaLuz += gris;
                }
                const brilloPromedio = sumaLuz / (TAM*TAM);
                const umbral = brilloPromedio * 0.85; // Punto de corte

                // 3. Creamos el código binario de la huella
                for(let i=0; i<datos.length; i+=4) {
                    const gris = (datos[i] + datos[i+1] + datos[i+2]) / 3;
                    // 1 = línea oscura, 0 = fondo claro
                    patron.push(gris < umbral ? 1 : 0);
                }

                // 4. Guardamos como cadena de texto para comparar
                const patronFinal = patron.join('');
                callback(patronFinal);
            };
            img.src = imagenDataURL;
        }


        // ==============================================
        // 📷 REGISTRAR
        // ==============================================
        const formRegistro = document.getElementById('formRegistro');
        const camaraRegistro = document.getElementById('camaraRegistro');
        const subirRegistro = document.getElementById('subirRegistro');
        const vistaRegistro = document.getElementById('vistaRegistro');
        const imgRegistroVista = document.getElementById('imgRegistroVista');

        function procesarImagen(archivo, callbackVista) {
            const reader = new FileReader();
            reader.onload = ev => {
                // Reducimos tamaño para guardar
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const MAX = 220;
                    if(w>h) { if(w>MAX) { h *= MAX/w; w=MAX; } }
                    else { if(h>MAX) { w *= MAX/h; h=MAX; } }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img,0,0,w,h);
                    const imgChica = canvas.toDataURL('image/jpeg', 0.8);

                    // Extraemos el patrón real
                    extraerPatron(imgChica, (patron) => {
                        huellaPatron = patron;
                        callbackVista(imgChica);
                    });
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(archivo);
        }

        camaraRegistro.onchange = e => {
            const f = e.target.files[0];
            if(!f) return;
            procesarImagen(f, (img) => {
                imgRegistroVista.src = img;
                vistaRegistro.classList.remove('hidden');
            });
        };

        subirRegistro.onchange = e => {
            const f = e.target.files[0];
            if(!f) return;
            procesarImagen(f, (img) => {
                imgRegistroVista.src = img;
                vistaRegistro.classList.remove('hidden');
            });
        };

        // Guardar
        formRegistro.onsubmit = e => {
            e.preventDefault();
            if(!huellaPatron) return alert("⚠️ Primero toma o sube la foto");

            const nuevo = {
                id: Date.now(),
                cedula: document.getElementById('cedula').value.trim(),
                nombres: document.getElementById('nombres').value.trim(),
                apellidos: document.getElementById('apellidos').value.trim(),
                telefono: document.getElementById('telefono').value.trim(),
                patron: huellaPatron, // Guardamos el patrón numérico
                imagen: imgRegistroVista.src
            };

            if(baseDatos.some(r => r.cedula === nuevo.cedula)) return alert("⚠️ Cédula ya existe");

            baseDatos.push(nuevo);
            localStorage.setItem('huellasRealDB', JSON.stringify(baseDatos));
            alert("✅ REGISTRO GUARDADO CON ÉXITO\nPatrón biométrico almacenado");

            // Limpiar
            formRegistro.reset();
            vistaRegistro.classList.add('hidden');
            huellaPatron = null;
        };


        // ==============================================
        // 🔍 BUSCAR Y COMPARACIÓN REAL
        // ==============================================
        const camaraBuscar = document.getElementById('camaraBuscar');
        const vistaCamaraBuscar = document.getElementById('vistaCamaraBuscar');
        const btnComparar1 = document.getElementById('btnComparar1');
        const subirBuscar = document.getElementById('subirBuscar');
        const vistaSubirBuscar = document.getElementById('vistaSubirBuscar');
        const btnComparar2 = document.getElementById('btnComparar2');
        const resultadoBusqueda = document.getElementById('resultadoBusqueda');
        let patronBuscar = null;

        camaraBuscar.onchange = e => {
            const f = e.target.files[0];
            if(!f) return;
            procesarImagen(f, (img) => {
                vistaCamaraBuscar.querySelector('img').src = img;
                vistaCamaraBuscar.classList.remove('hidden');
                extraerPatron(img, p => { patronBuscar = p; });
            });
        };

        subirBuscar.onchange = e => {
            const f = e.target.files[0];
            if(!f) return;
            procesarImagen(f, (img) => {
                vistaSubirBuscar.querySelector('img').src = img;
                vistaSubirBuscar.classList.remove('hidden');
                extraerPatron(img, p => { patronBuscar = p; });
            });
        };


        // ✅ COMPARACIÓN INTELIGENTE
        function compararPatrones() {
            if(!patronBuscar) return alert("⚠️ Procesa primero la foto");
            resultadoBusqueda.classList.remove('hidden');
            resultadoBusqueda.className = 'mt-6 p-4 rounded-lg bg-blue-50 border border-blue-200';
            resultadoBusqueda.innerHTML = `<p class="text-center">🔍 ANALIZANDO PATRONES...</p>`;

            setTimeout(() => {
                if(baseDatos.length === 0) {
                    resultadoBusqueda.className = 'mt-6 p-4 rounded-lg bg-red-50 border border-red-200';
                    resultadoBusqueda.innerHTML = `<p class="text-red-600 text-center font-bold">❌ Base de datos vacía</p>`;
                    return;
                }

                let mejorCoincidencia = null;
                let mejorPorcentaje = 0;
                const UMBRAL_ACEPTACION = 70; // % mínimo para decir que es la misma

                // Comparamos con todos los registros
                baseDatos.forEach(reg => {
                    let aciertos = 0;
                    // Contamos cuántos puntos coinciden
                    for(let i=0; i < patronBuscar.length; i++) {
                        if(reg.patron[i] === patronBuscar[i]) aciertos++;
                    }
                    const porcentaje = Math.round( (aciertos / patronBuscar.length) * 100 );

                    if(porcentaje > mejorPorcentaje) {
                        mejorPorcentaje = porcentaje;
                        mejorCoincidencia = reg;
                    }
                });


                // 📌 RESULTADO FINAL
                if(mejorPorcentaje >= UMBRAL_ACEPTACION) {
                    resultadoBusqueda.className = 'mt-6 p-4 rounded-lg bg-green-50 border border-green-200';
                    resultadoBusqueda.innerHTML = `
                        <h4 class="font-bold text-green-700 text-lg mb-3 text-center">✅ COINCIDENCIA ENCONTRADA</h4>
                        <div class="text-center mb-2">
                            <span class="bg-green-600 text-white px-3 py-1 rounded-full font-bold">${mejorPorcentaje}% SIMILITUD</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-sm max-w-sm mx-auto mt-4">
                            <span class="font-medium">Cédula:</span> <span>${mejorCoincidencia.cedula}</span>
                            <span class="font-medium">Nombre:</span> <span>${mejorCoincidencia.nombres} ${mejorCoincidencia.apellidos}</span>
                            <span class="font-medium">Teléfono:</span> <span>${mejorCoincidencia.telefono||'—'}</span>
                        </div>
                        <div class="mt-3 text-center">
                            <p class="text-xs text-gray-600 mb-1">Huella registrada:</p>
                            <img src="${mejorCoincidencia.imagen}" class="max-h-20 mx-auto rounded border" alt="Guardada">
                        </div>
                    `;
                } else {
                    resultadoBusqueda.className = 'mt-6 p-4 rounded-lg bg-red-50 border border-red-200';
                    resultadoBusqueda.innerHTML = `
                        <p class="font-bold text-red-600 text-center">❌ NO ES LA MISMA HUELLA</p>
                        <p class="text-sm text-center mt-1">Similitud: ${mejorPorcentaje}% (menos del 70% requerido)</p>
                    `;
                }

                patronBuscar = null; // Limpiar para siguiente
            }, 1500);
        }

        btnComparar1.onclick = compararPatrones;
        btnComparar2.onclick = compararPatrones;
    </script>
</body>
</html>
